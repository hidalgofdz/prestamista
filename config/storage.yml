test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

railway:
  service: S3
  access_key_id: <%= ENV["ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["SECRET_ACCESS_KEY"] %>
  endpoint: <%= ENV["ENDPOINT"] %>
  bucket: <%= ENV["BUCKET"] %>
  region: <%= ENV["REGION"] %>
  force_path_style: true
