services:
  db:
    image: postgres:17.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prestamista}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prestamista_dev}
      POSTGRES_DB: ${POSTGRES_DB:-prestamista_development}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prestamista}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
